name: Run Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-make

    - name: Setup vcpkg and install dependencies
      shell: bash
      run: |
        export PATH="/c/msys64/mingw64/bin:/c/msys64/usr/bin:$PATH"
        # Download and setup vcpkg in a temporary location
        mkdir -p /tmp/vcpkg-build
        cd /tmp/vcpkg-build
        git clone https://github.com/Microsoft/vcpkg.git .
        ./bootstrap-vcpkg.sh -disableMetrics
        ./vcpkg install gtest:x64-mingw-dynamic --triplet x64-mingw-dynamic
        echo "VCPKG_INSTALLED=/tmp/vcpkg-build/installed" >> $GITHUB_ENV

    - name: Build and run tests
      shell: bash
      run: |
        export PATH="/c/msys64/mingw64/bin:/c/msys64/usr/bin:$PATH"
        export VCPKG_ROOT=/tmp/vcpkg-build
        make test

    - name: Clean build artifacts
      shell: bash
      if: always()
      run: |
        export PATH="/c/msys64/mingw64/bin:/c/msys64/usr/bin:$PATH"
        make clean
