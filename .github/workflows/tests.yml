name: Run Google Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # 1.    # "Set up GCC" step with this:
    - name: Set up MinGW
      uses: egor-tensin/setup-mingw@v3
      with:
        platform: x64
        cc: 0  # This goes inside the 'with' section



    # 2. Build the project using your Makefile
    - name: Build with Make
      run: make  # This creates your .exe

    # 3. Run the tests
    - name: Run tests
      run: make test  # Or directly: .\run_tests.exe --gtest_output=xml:report.xml

    - name: Upload XML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: report.xml
