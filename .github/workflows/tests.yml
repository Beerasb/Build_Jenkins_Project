name: Run Google Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1

    - name: Build solution
      run: msbuild my_project.sln

    - name: Run tests
      run: |
        .\path\to\your_tests.exe --gtest_output=xml:report.xml

    - name: Upload XML artifact
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: report.xml
