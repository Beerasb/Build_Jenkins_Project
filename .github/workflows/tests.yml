name: Run Google Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # 1. Install Google Test for MinGW using vcpkg
    - name: Install Google Test
      shell: cmd
      run: |
        vcpkg install gtest:x64-mingw-dynamic

    # 2. Add vcpkg's installed binaries to the PATH so make can find them
    - name: Set up Environment
      shell: cmd
      run: |
        echo C:\vcpkg\installed\x64-mingw-dynamic\bin >> %GITHUB_PATH%

    # 3. Build and Run Tests
    - name: Build and Test
      shell: cmd
      run: |
        make test

    - name: Upload XML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: report.xml
