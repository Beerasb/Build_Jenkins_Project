name: Run Google Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: List files
      run: dir
      
    - name: Build using makefile
      run: nmake /f makefile

    - name: Run tests
      run: .\run_tests.exe --gtest_output=xml:report.xml

    - name: Upload XML artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: report.xml
