name: Run Google Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: List files (debug)
      run: dir

    - name: Run tests
      run: .\run_tests.exe --gtest_output=xml:report.xml

    - name: Upload XML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: report.xml
