name: Run Google Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  hobby-project-build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install Google Test
      shell: cmd
      run: vcpkg install gtest:x64-mingw-dynamic

    - name: Build and Test
      shell: cmd
      run: |
        :: Point to the vcpkg installation
        set VCPKG_ROOT=C:/vcpkg
        
        :: Add binaries to PATH so run_tests.exe can find DLLs at runtime
        set PATH=C:\ProgramData\Chocolatey\bin;C:\vcpkg\installed\x64-mingw-dynamic\bin;%PATH%
        
        :: Run make. Note: We use mingw32-make as it's the standard name on Windows runners.
        mingw32-make test
